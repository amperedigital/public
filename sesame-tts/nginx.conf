# ---------------------------------------------------------------------------
# nginx.conf — GetAmpere Sesame TTS dual-GPU load balancer
# ---------------------------------------------------------------------------
# Round-robins between csm-0 (port 8080) and csm-1 (port 8081).
# proxy_next_upstream http_503 retries on the other GPU when busy —
# so the Worker never sees a 503 unless BOTH GPUs are busy.
# ---------------------------------------------------------------------------

events {
    worker_connections 64;
}

http {
    upstream csm_pool {
        server localhost:8080;   # csm-0, GPU 0
        server localhost:8081;   # csm-1, GPU 1
    }

    server {
        listen 80;

        # Pass all requests to the CSM pool.
        # If a worker returns 503 (busy), nginx immediately retries on
        # the other server — transparent to the caller.
        location / {
            proxy_pass              http://csm_pool;
            proxy_next_upstream     error timeout http_503;
            proxy_next_upstream_tries 2;
            proxy_read_timeout      120s;
            proxy_send_timeout      120s;
            proxy_buffering         off;     # required for streaming PCM response
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
        }
    }
}
